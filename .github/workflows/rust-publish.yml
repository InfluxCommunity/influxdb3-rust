name: "Publish Rust Package"

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest

    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_TEST_DEBUG: 0
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Verify release tag matches package version
        run: |
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "influxdb3-client") | .version')"
          release_version="${GITHUB_REF_NAME#v}"

          if [ "$release_version" != "$package_version" ]; then
            echo "Release tag '${GITHUB_REF_NAME}' does not match Cargo.toml version '${package_version}'."
            echo "Expected release tag '${package_version}' or 'v${package_version}'."
            exit 1
          fi

      - name: Verify package
        run: cargo publish --dry-run --locked

      - name: Publish package
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
