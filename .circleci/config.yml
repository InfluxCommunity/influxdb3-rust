# .circleci/config.yml
version: 2.1

parameters:
  default-rust-image:
    type: string
    default: "cimg/rust:1.96"

executors:
  docker-amd64-image:
    parameters:
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    docker:
      - image: << parameters.rust-image >>
      - image: influxdb:3-core
        environment:
          INFLUXDB3_NODE_IDENTIFIER_PREFIX: node01
          INFLUXDB3_OBJECT_STORE: file
          INFLUXDB3_DB_DIR: /var/lib/influxdb3/data

  docker-arm64-image:
    parameters:
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    docker:
      - image: << parameters.rust-image >>
      - image: influxdb:3-core
        environment:
          INFLUXDB3_NODE_IDENTIFIER_PREFIX: node01
          INFLUXDB3_OBJECT_STORE: file
          INFLUXDB3_DB_DIR: /var/lib/influxdb3/data
    resource_class: arm.medium

jobs:
  tests-rust:
    parameters:
      exe:
        type: string
        default: docker-amd64-image
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    executor:
      name: << parameters.exe >>
      rust-image: << parameters.rust-image >>

    steps:
      - checkout

      - restore_cache:
          name: Restoring Cargo Cache
          keys:
            - cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-{{ checksum "Cargo.lock" }}
            - cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-

      - run:
          name: Install cargo-nextest
          command: |
            case "$(uname -m)" in
              x86_64)
                nextest_url="https://get.nexte.st/0.9.98/linux"
                ;;
              aarch64|arm64)
                nextest_url="https://get.nexte.st/0.9.98/linux-arm"
                ;;
              *)
                echo "Unsupported architecture for cargo-nextest: $(uname -m)"
                exit 1
                ;;
            esac
            curl -LsSf "$nextest_url" | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"
            cargo nextest --version

      - run:
          name: Check package
          command: cargo package

      - run:
          name: Setup InfluxDB service
          command: |
            ./scripts/influxdb-setup.sh \
              --export-url-as TESTING_INFLUXDB_URL \
              --export-db-as TESTING_INFLUXDB_DATABASE \
              --export-token-as TESTING_INFLUXDB_TOKEN

      - run:
          name: Run tests
          command: CARGO_INCREMENTAL=0 CARGO_PROFILE_TEST_DEBUG=0 cargo nextest run --all-features --profile ci

      - store_test_results:
          path: test-results

      - save_cache:
          name: Saving Cargo Cache
          key: cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - target

  lint:
    executor: docker-amd64-image
    steps:
      - checkout

      - restore_cache:
          name: Restoring Cargo Cache
          keys:
            - cargo-cache-v1-{{ arch }}-<< pipeline.parameters.default-rust-image >>-{{ checksum "Cargo.lock" }}
            - cargo-cache-v1-{{ arch }}-<< pipeline.parameters.default-rust-image >>-

      - run:
          name: Install Dependencies
          command: rustup component add rustfmt clippy

      - run:
          name: Check formatting
          command: cargo fmt --all --check

      - run:
          name: Lint rust code
          command: cargo clippy --all-targets --all-features

      - save_cache:
          name: Saving Cargo Cache
          key: cargo-cache-v1-{{ arch }}-<< pipeline.parameters.default-rust-image >>-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - target

workflows:
  version: 2
  build:
    jobs:
      - lint
      - tests-rust:
          matrix:
            parameters:
              exe: [ docker-amd64-image, docker-arm64-image ]
              rust-image: [ << pipeline.parameters.default-rust-image >>, "cimg/rust:1.86" ]
