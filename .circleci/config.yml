# .circleci/config.yml
version: 2.1

parameters:
  default-rust-image:
    type: string
    default: "cimg/rust:1.96"

executors:
  docker-amd64-image:
    parameters:
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    docker:
      - image: << parameters.rust-image >>
      - image: influxdb:3-core
        environment:
          INFLUXDB3_NODE_IDENTIFIER_PREFIX: node01
          INFLUXDB3_OBJECT_STORE: file
          INFLUXDB3_DB_DIR: /var/lib/influxdb3/data

  docker-arm64-image:
    parameters:
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    docker:
      - image: << parameters.rust-image >>
      - image: influxdb:3-core
        environment:
          INFLUXDB3_NODE_IDENTIFIER_PREFIX: node01
          INFLUXDB3_OBJECT_STORE: file
          INFLUXDB3_DB_DIR: /var/lib/influxdb3/data
    resource_class: arm.medium

commands:
  upload-codecov-amd64:
    steps:
      - run:
          name: Collecting coverage reports
          command: |
            curl -Os https://uploader.codecov.io/latest/linux/codecov
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM
            curl -Os https://uploader.codecov.io/latest/linux/codecov.SHA256SUM.sig
            curl -fsSL https://uploader.codecov.io/verification.gpg | gpg --no-default-keyring --keyring trustedkeys.gpg --import
            gpgv codecov.SHA256SUM.sig codecov.SHA256SUM
            shasum -a 256 -c codecov.SHA256SUM
            chmod +x ./codecov
            ./codecov

jobs:
  tests-rust:
    parameters:
      exe:
        type: string
        default: docker-amd64-image
      rust-image:
        type: string
        default: << pipeline.parameters.default-rust-image >>
    executor:
      name: << parameters.exe >>
      rust-image: << parameters.rust-image >>

    steps:
      - checkout

      - run:
          name: Configure Cargo for CI
          command: |
            mkdir -p .cargo
            cat > .cargo/config.toml <<'EOF'
            [build]
            incremental = false

            [profile.dev]
            debug = 0

            [profile.test]
            debug = 0
            EOF

      - restore_cache:
          name: Restoring Cargo Cache
          keys:
            - cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-{{ checksum "Cargo.lock" }}
            - cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-

      - run:
          name: Check MSRV compatibility
          command: |
            cargo check --locked --all-targets --all-features

      - run:
          name: Check package
          command: cargo package --locked

      - run:
          name: Install cargo-nextest
          command: |
            case "$(uname -m)" in
              x86_64)
                nextest_url="https://get.nexte.st/0.9.98/linux"
                ;;
              aarch64|arm64)
                nextest_url="https://get.nexte.st/0.9.98/linux-arm"
                ;;
              *)
                echo "Unsupported architecture for cargo-nextest: $(uname -m)"
                exit 1
                ;;
            esac
            curl -LsSf "$nextest_url" | tar zxf - -C "${CARGO_HOME:-$HOME/.cargo}/bin"
            cargo nextest --version

      - when:
          condition:
            and:
              - equal: [ docker-amd64-image, << parameters.exe >> ]
              - equal: [ << pipeline.parameters.default-rust-image >>, << parameters.rust-image >> ]
          steps:
            - restore_cache:
                name: Restoring Cargo Tools Cache
                keys:
                  - cargo-tools-v1-{{ arch }}-<< parameters.rust-image >>

            - run:
                name: Install coverage tools
                command: |
                  rustup component add llvm-tools-preview
                  command -v cargo-llvm-cov || cargo install cargo-llvm-cov --locked

      - run:
          name: Setup InfluxDB service
          command: |
            ./scripts/influxdb-setup.sh \
              --export-url-as TESTING_INFLUXDB_URL \
              --export-db-as TESTING_INFLUXDB_DATABASE \
              --export-token-as TESTING_INFLUXDB_TOKEN

      - run:
          name: Run tests
          command: |
            if [[ "<< parameters.exe >>" == "docker-amd64-image" && "<< parameters.rust-image >>" == "<< pipeline.parameters.default-rust-image >>" ]]; then
              cargo llvm-cov nextest --all-features --profile ci --lcov --output-path lcov.info
            else
              cargo nextest run --all-features --profile ci
            fi

      - when:
          condition:
            and:
              - equal: [ docker-amd64-image, << parameters.exe >> ]
              - equal: [ << pipeline.parameters.default-rust-image >>, << parameters.rust-image >> ]
          steps:
            - upload-codecov-amd64
            - store_artifacts:
                path: lcov.info
            - save_cache:
                name: Saving Cargo Tools Cache
                key: cargo-tools-v1-{{ arch }}-<< parameters.rust-image >>
                paths:
                  - ~/.cargo/bin

      - store_test_results:
          path: test-results

      - save_cache:
          name: Saving Cargo Cache
          key: cargo-cache-v1-{{ arch }}-<< parameters.rust-image >>-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - target

workflows:
  version: 2
  build:
    jobs:
      - tests-rust:
          matrix:
            parameters:
              exe: [ docker-amd64-image, docker-arm64-image ]
              rust-image: [ << pipeline.parameters.default-rust-image >>, "cimg/rust:1.89" ]
